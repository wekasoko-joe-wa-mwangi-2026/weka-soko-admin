<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#1428A0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="WS Admin" />
    <meta name="application-name" content="WS Admin" />
    <meta name="msapplication-TileColor" content="#1428A0" />
    <title>Weka Soko Admin</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <style>
      *{margin:0;padding:0;box-sizing:border-box;}
      html,body{min-height:100vh;}
      body{background:#F4F6FB;font-family:'Plus Jakarta Sans',system-ui,sans-serif;}
      #root{min-height:100vh;}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Register service worker for PWA install support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
